packages:
  - "packages/*"
  - "apps/*"

# pnpm 11 gates dependency build scripts; explicitly allow esbuild (vitest's bundler)
# and better-sqlite3 (native SQLite driver — needs its node-gyp build to run).
allowBuilds:
  esbuild: true
  better-sqlite3: true
  # Electron's postinstall downloads the platform binary; required to launch the desktop app.
  electron: true
  # @temporalio/worker's swc bundler + protobufjs postinstall ship prebuilt/fallback
  # artifacts, so their build scripts are not needed for our (gated-Temporal) worker path.
  '@swc/core': false
  protobufjs: false

# Force the protobufjs moderate advisory (GHSA schema-name shadowing, <=7.6.2) to a
# patched version across the @temporalio/proto transitive tree.
overrides:
  protobufjs: '^7.6.3'

minimumReleaseAgeExclude:
  - '@temporalio/activity@1.19.0'
  - '@temporalio/client@1.19.0'
  - '@temporalio/common@1.19.0'
  - '@temporalio/core-bridge@1.19.0'
  - '@temporalio/nexus@1.19.0'
  - '@temporalio/proto@1.19.0'
  - '@temporalio/testing@1.19.0'
  - '@temporalio/worker@1.19.0'
  - '@temporalio/workflow@1.19.0'

# pnpm 11's pre-run deps verification re-runs install and trips on the build gate;
# disable it so `pnpm test`/`typecheck` run directly.
verifyDepsBeforeRun: false
